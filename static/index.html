<!DOCTYPE html>
<html lang="ru" data-page="home">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кузовок</title>
    <script>
        (function (window, document) {
            const page = document.documentElement.dataset.page;
            const path = window.location.pathname || "/";

            function trimSuffixes(suffixes) {
                for (const suffix of suffixes) {
                    if (path === suffix) {
                        return "";
                    }
                    if (path.endsWith(suffix)) {
                        return path.slice(0, -suffix.length);
                    }
                }
                if (path === "/") {
                    return "";
                }
                return path.endsWith("/") ? path.slice(0, -1) : path;
            }

            let basePath = "";
            if (page === "profile") {
                basePath = trimSuffixes(["/static/profile.html", "/profile.html", "/profile/", "/profile"]);
            } else if (page === "admin") {
                basePath = trimSuffixes(["/static/admin.html", "/admin.html", "/admin/", "/admin"]);
            } else if (page === "user") {
                const match = path.match(/\/user\/[^/]+\/?$/);
                basePath = match ? path.slice(0, -match[0].length) : trimSuffixes(["/static/user.html", "/user.html"]);
            } else {
                basePath = trimSuffixes(["/static/index.html", "/index.html", "/index.php"]);
            }

            window.__KUZOVOK_BASE_PATH__ = basePath;

            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = `${basePath}/static/app.css`;
            document.head.appendChild(link);

            window.__loadKuzovokScripts__ = function (scripts) {
                return scripts.reduce((promise, scriptName) => {
                    return promise.then(() => new Promise((resolve, reject) => {
                        const script = document.createElement("script");
                        script.src = `${basePath}/static/${scriptName}`;
                        script.async = false;
                        script.onload = resolve;
                        script.onerror = reject;
                        document.body.appendChild(script);
                    }));
                }, Promise.resolve());
            };
        })(window, document);
    </script>
</head>
<body>
    <div class="ocean-bg" id="oceanBg"></div>
    <div class="seaweed seaweed--left"></div>
    <div class="seaweed"></div>
    <div class="seaweed"></div>
    <div class="seaweed"></div>

    <main class="page-shell page-shell--narrow">
        <header class="home-header">
            <img id="siteLogo" class="logo site-logo site-logo--hero" alt="Кузовок">
            <h1 class="page-title">Кузовок</h1>
            <p class="page-subtitle">Социальная сеть океанариума</p>
        </header>

        <section id="authContainer" class="auth-panel">
            <div id="loginForm">
                <h2 class="auth-title">Вход</h2>
                <div id="loginError" class="message error hidden"></div>
                <div class="form-group">
                    <label for="loginUsername">Логин</label>
                    <input type="text" id="loginUsername" placeholder="fish">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Пароль</label>
                    <input type="password" id="loginPassword" placeholder="******">
                </div>
                <button id="loginButton" class="btn btn-primary full-width" type="button">Войти</button>
                <div class="auth-toggle">
                    Нет аккаунта?
                    <button id="showRegisterLink" class="text-link-button" type="button">Зарегистрироваться</button>
                </div>
            </div>

            <div id="registerForm" class="hidden">
                <h2 class="auth-title">Регистрация</h2>
                <div id="registerError" class="message error hidden"></div>
                <div class="form-group">
                    <label for="regUsername">Логин</label>
                    <input type="text" id="regUsername" placeholder="fish">
                </div>
                <div class="form-group">
                    <label for="regPassword">Пароль</label>
                    <input type="password" id="regPassword" placeholder="******">
                </div>
                <button id="registerButton" class="btn btn-primary full-width" type="button">Создать аккаунт</button>
                <div class="auth-toggle">
                    Уже есть аккаунт?
                    <button id="showLoginLink" class="text-link-button" type="button">Войти</button>
                </div>
            </div>
        </section>

        <section id="appContainer" class="app-panel hidden">
            <div id="appHeader" class="user-info">
                <div>Привет, <strong id="username"></strong>!</div>
                <div class="header-actions">
                    <a id="adminPanelLink" class="btn btn-secondary header-button hidden" href="#">Админ панель</a>
                    <a id="profileLink" class="btn btn-secondary header-button" href="#">Профиль</a>
                    <button id="logoutButton" class="btn btn-secondary header-button" type="button">Выйти</button>
                </div>
            </div>

            <div id="appContent">
                <div class="create-row">
                    <button id="openCreatePostButton" class="create-btn" type="button">Новый пост</button>
                </div>
                <div id="postsContainer" class="posts-list"></div>
            </div>

            <div id="lockedState" class="locked-state hidden">
                <div class="locked-title">Доступ пока закрыт</div>
                <div id="lockedMessage" class="locked-copy">извините, вы пока не кузовок</div>
            </div>
        </section>
    </main>

    <div id="postModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <span id="modalTitle">Новый пост</span>
                <button id="modalCloseButton" class="modal-close" type="button">×</button>
            </div>
            <div class="modal-body">
                <div id="modalReplyBlock" class="reply-to-block hidden">
                    <div class="reply-to-info">
                        <span>↩ Ответ на:</span>
                        <strong id="modalReplyUsername"></strong>
                        <span>—</span>
                        <span id="modalReplyContent"></span>
                    </div>
                    <button id="clearModalReplyButton" class="reply-to-clear" type="button">×</button>
                </div>

                <div id="modalPostSuccess" class="message success hidden"></div>
                <div id="modalPostError" class="message error hidden"></div>

                <textarea id="modalPostContent" placeholder="Расскажите обитателям океанариума о чём-нибудь..."></textarea>

                <div class="modal-attach">
                    <input id="modalPostImageInput" class="file-input" type="file" accept="image/jpeg,image/png,image/webp,image/gif">
                    <button id="openModalImageButton" class="attach-btn" type="button">📷 Добавить картинку</button>
                    <span id="modalSelectedImageName" class="attach-name">Без картинки</span>
                    <button id="modalClearImageButton" class="attach-clear hidden" type="button">Убрать</button>
                    <div class="attach-hint">Картинка хранится 24 часа.</div>
                </div>

                <img id="modalImagePreview" class="modal-image-preview" alt="Превью">
            </div>
            <div class="modal-footer">
                <button id="modalSubmitButton" class="btn btn-primary full-width" type="button">Опубликовать</button>
            </div>
        </div>
    </div>

    <script>
        window.__loadKuzovokScripts__(["shared.js", "index.js"]);
    </script>
</body>
</html>
