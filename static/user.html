<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — Кузовок</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; min-height: 100vh; background: linear-gradient(180deg, #006994 0%, #003366 50%, #001a33 100%); color: #fff; }
        .ocean-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .bubble { position: absolute; background: rgba(255,255,255,0.1); border-radius: 50%; animation: rise 8s infinite ease-in; }
        @keyframes rise { 0% { transform: translateY(100vh) scale(1); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: translateY(-100px) scale(1.2); opacity: 0; } }
        .fish { position: absolute; animation: swim 20s infinite linear; opacity: 0.6; font-size: 24px; }
        @keyframes swim { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100px); } }
        .container { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; padding: 20px; }
        .hidden { display: none !important; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .logo-link { text-decoration: none; }
        .logo { font-size: 2.5em; display: inline-block; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .btn-back { background: rgba(255,255,255,0.1); color: #fff; border: none; padding: 10px 20px; border-radius: 999px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: background 0.2s; }
        .btn-back:hover { background: rgba(255,255,255,0.2); }
        .btn-back::before { content: "←"; }
        .profile-card { background: rgba(0, 105, 148, 0.3); backdrop-filter: blur(10px); border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .profile-header { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 20px; }
        .avatar { font-size: 80px; line-height: 1; }
        .profile-info { flex: 1; }
        .profile-name { font-size: 1.5em; font-weight: 600; color: #d9fbff; margin-bottom: 4px; }
        .profile-username { color: rgba(255,255,255,0.7); font-size: 1em; margin-bottom: 8px; }
        .profile-bio { color: rgba(255,255,255,0.85); line-height: 1.5; margin-bottom: 16px; }
        .profile-stats { display: flex; gap: 24px; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.3em; font-weight: 600; color: #7fdbff; }
        .stat-label { font-size: 0.85em; color: rgba(255,255,255,0.6); }
        .posts-title { font-size: 1.2em; margin-bottom: 15px; color: rgba(255,255,255,0.9); }
        .post { background: rgba(0, 51, 102, 0.4); border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(127, 219, 255, 0.2); position: relative; }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .post-author { font-weight: 600; color: #7fdbff; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .post-author:hover { text-decoration: underline; }
        .post-author-avatar { font-size: 1.2em; }
        .post-date { font-size: 0.85em; color: rgba(255,255,255,0.5); }
        .post-content { line-height: 1.6; word-wrap: break-word; margin-bottom: 14px; }
        .post-parent { background: rgba(0, 188, 212, 0.1); border-left: 3px solid rgba(0, 188, 212, 0.5); padding: 8px 12px; margin-bottom: 12px; border-radius: 0 8px 8px 0; font-size: 14px; color: rgba(255,255,255,0.8); cursor: pointer; }
        .post-parent:hover { background: rgba(0, 188, 212, 0.15); }
        .post-parent strong { color: #7fdbff; }
        .post-image { position: relative; margin-bottom: 14px; border-radius: 16px; overflow: hidden; border: 1px solid rgba(127, 219, 255, 0.25); background: rgba(0, 25, 51, 0.45); }
        .post-image img { display: block; width: 100%; max-height: 420px; object-fit: cover; }
        .image-timer { position: absolute; top: 12px; right: 12px; padding: 7px 11px; border-radius: 999px; background: rgba(0, 11, 25, 0.78); color: #d8fbff; font-size: 13px; letter-spacing: 0.03em; border: 1px solid rgba(127, 219, 255, 0.18); }
        .post-footer { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .post-actions { display: flex; gap: 15px; }
        .like-btn { background: none; border: none; color: rgba(255,255,255,0.7); cursor: pointer; font-size: 1.2em; display: flex; align-items: center; gap: 5px; }
        .like-btn:hover { color: #ff6b6b; }
        .like-btn.liked { color: #ff6b6b; }
        .empty-state { text-align: center; padding: 40px; color: rgba(255,255,255,0.5); }
        .error { background: rgba(255, 107, 107, 0.2); border: 1px solid rgba(255, 107, 107, 0.5); color: #ff6b6b; padding: 12px; border-radius: 10px; margin-bottom: 20px; }
        .loading { text-align: center; padding: 40px; color: rgba(255,255,255,0.7); }
        .seaweed { position: fixed; bottom: 0; width: 60px; background: linear-gradient(to top, #2d5016, #4a7c23); border-radius: 50% 50% 0 0; animation: sway 3s ease-in-out infinite; z-index: 0; pointer-events: none; }
        @keyframes sway { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
        .seaweed:nth-child(1) { left: 5%; height: 150px; }
        .seaweed:nth-child(2) { left: 15%; height: 200px; animation-delay: 0.5s; }
        .seaweed:nth-child(3) { right: 15%; height: 180px; animation-delay: 1s; }
        .seaweed:nth-child(4) { right: 5%; height: 160px; animation-delay: 1.5s; }
    </style>
</head>
<body>
    <div class="ocean-bg" id="oceanBg"></div>
    <div class="seaweed"></div><div class="seaweed"></div><div class="seaweed"></div><div class="seaweed"></div>
    <div class="container">
        <div class="header">
            <a href="#" id="logoLink" class="logo-link"><span class="logo">🐠</span></a>
            <a href="#" id="backLink" class="btn-back">На главную</a>
        </div>
        <div id="loadingState" class="loading">Загрузка...</div>
        <div id="errorState" class="hidden">
            <div class="profile-card">
                <div id="errorMessage" class="error"></div>
                <div style="text-align:center;margin-top:20px;">
                    <a href="#" id="errorBackLink" class="btn-back">На главную</a>
                </div>
            </div>
        </div>
        <div id="profileContent" class="hidden">
            <div class="profile-card">
                <div class="profile-header">
                    <div class="avatar" id="profileAvatar">🐠</div>
                    <div class="profile-info">
                        <div class="profile-name" id="profileName">—</div>
                        <div class="profile-username" id="profileUsername">@...</div>
                        <div class="profile-bio" id="profileBio">Нет описания</div>
                        <div class="profile-stats">
                            <div class="stat">
                                <div class="stat-value" id="postCount">0</div>
                                <div class="stat-label">постов</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value" id="likeCount">0</div>
                                <div class="stat-label">лайков</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="posts-title">Посты</div>
            <div id="postsContainer"></div>
        </div>
    </div>
    <script>
        const API_BASE = (function() {
            const path = window.location.pathname || "/";
            // Decode for processing
            const decodedPath = decodeURIComponent(path);
            // Find /user/ pattern and extract base path
            const userMatch = decodedPath.match(/\/user\/[^/]+/);
            if (userMatch) {
                const userIndex = decodedPath.indexOf(userMatch[0]);
                return userIndex > 0 ? decodedPath.substring(0, userIndex) : "";
            }
            // For other paths
            const suffixes = ["/static/index.html", "/static/user.html", "/index.html", "/user.html", "/index.php"];
            for (const suffix of suffixes) {
                if (path.endsWith(suffix)) {
                    return path.slice(0, -suffix.length);
                }
            }
            if (path === "/" || path === "/user" || path === "/user/") return "";
            return path.endsWith("/") ? path.slice(0, -1) : path;
        })();
        
        function userUrl(username) {
            return API_BASE + "/user/" + encodeURIComponent(username);
        }
        
        function homeUrl() {
            return API_BASE + "/";
        }
        
        function getUsernameFromPath() {
            const path = window.location.pathname || "/";
            const decodedPath = decodeURIComponent(path);
            const match = decodedPath.match(/\/user\/([^/]+)/);
            return match ? match[1] : null;
        }

        function createBubbles() {
            const container = document.getElementById("oceanBg");
            for (let i = 0; i < 10; i++) {
                const bubble = document.createElement("div");
                bubble.className = "bubble";
                bubble.style.left = Math.random() * 100 + "%";
                bubble.style.width = bubble.style.height = (Math.random() * 20 + 10) + "px";
                bubble.style.animationDelay = Math.random() * 8 + "s";
                container.appendChild(bubble);
            }
        }

        function createFish() {
            const container = document.getElementById("oceanBg");
            const emojis = ["🐠", "🐟", "🐡", "🦈", "🐋"];
            for (let i = 0; i < 3; i++) {
                const fish = document.createElement("div");
                fish.className = "fish";
                fish.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                fish.style.fontSize = (Math.random() * 20 + 20) + "px";
                fish.style.top = (Math.random() * 60 + 10) + "%";
                container.appendChild(fish);
            }
        }

        async function api(endpoint, options = {}) {
            try {
                const headers = { ...(options.headers || {}) };
                if (options.body instanceof FormData) {
                    delete headers["Content-Type"];
                } else if (!headers["Content-Type"]) {
                    headers["Content-Type"] = "application/json";
                }
                const url = `${API_BASE}/api${endpoint}`;
                const response = await fetch(url, {
                    ...options,
                    headers,
                    credentials: "include"
                });
                return await response.json();
            } catch (error) {
                return { success: false, message: "Ошибка сети" };
            }
        }

        function showError(message) {
            document.getElementById("loadingState").classList.add("hidden");
            document.getElementById("errorState").classList.remove("hidden");
            document.getElementById("errorMessage").textContent = message;
        }

        async function loadUserProfile() {
            const username = getUsernameFromPath();
            if (!username) {
                showError("Не указан пользователь");
                return;
            }

            document.title = username + " — Кузовок";

            const response = await api("/users/" + encodeURIComponent(username));
            if (!response.success) {
                showError(response.message || "Пользователь не найден");
                return;
            }

            const p = response.data;
            document.getElementById("loadingState").classList.add("hidden");
            document.getElementById("profileContent").classList.remove("hidden");
            
            document.getElementById("profileAvatar").textContent = p.avatar || '🐠';
            document.getElementById("profileName").textContent = p.name || p.username;
            document.getElementById("profileUsername").textContent = "@" + p.username;
            document.getElementById("profileBio").textContent = p.bio || "Нет описания";
            document.getElementById("postCount").textContent = p.post_count || 0;
            document.getElementById("likeCount").textContent = p.like_count || 0;

            loadUserPosts(username);
        }

        async function loadUserPosts(username) {
            const response = await api("/feed");
            const container = document.getElementById("postsContainer");
            
            if (response.success && response.data) {
                const userPosts = response.data.filter(post => post.username === username);
                
                if (userPosts.length > 0) {
                    window.postsCache = {};
                    userPosts.forEach(post => { window.postsCache[post.id] = post; });
                    container.innerHTML = userPosts.map(renderPost).join("");
                    updateImageCountdowns();
                } else {
                    container.innerHTML = '<div class="empty-state">У этого пользователя пока нет постов</div>';
                }
            } else {
                container.innerHTML = '<div class="empty-state">Не удалось загрузить посты</div>';
            }
        }

        function renderPost(post) {
            const likedClass = post.liked ? " liked" : "";
            const likedLabel = post.liked ? "Убрать лайк" : "Поставить лайк";
            const displayName = post.name || post.username;
            const contentHtml = post.content ? '<div class="post-content">' + esc(post.content) + '</div>' : "";
            const imageHtml = renderPostImage(post);
            const parentHtml = renderParentPost(post);
            const actionsHtml = '<div class="post-actions"><button class="like-btn' + likedClass + '" aria-label="' + likedLabel + '" onclick="likePost(' + post.id + ', this)">❤️ <span>' + post.likes + '</span></button></div>';
            return '<div class="post" id="post-' + post.id + '"><div class="post-header"><div class="post-author"><span class="post-author-avatar">' + esc(post.avatar || '🐠') + '</span><a href="' + userUrl(post.username) + '" onclick="event.stopPropagation();">' + esc(displayName) + '</a></div><div class="post-date">' + fmt(post.created_at) + '</div></div>' + parentHtml + contentHtml + imageHtml + '<div class="post-footer">' + actionsHtml + '</div></div>';
        }

        function renderParentPost(post) {
            if (!post.parent_post || !post.parent_post.id) return "";
            const parent = post.parent_post;
            const parentName = parent.name || parent.username;
            return '<div class="post-parent" onclick="window.location=\'/user/' + parent.username + '\'">↩ Ответ на: <strong>@' + esc(parent.username) + '</strong> — ' + esc(truncateText(parent.content, 20)) + '</div>';
        }

        function renderPostImage(post) {
            if (!post.image_url || !post.image_expires_at) return "";
            return '<div class="post-image" data-expires-at="' + esc(post.image_expires_at) + '"><img src="' + esc(resolveMediaUrl(post.image_url)) + '" alt=""><div class="image-timer"></div></div>';
        }

        function resolveMediaUrl(url) {
            if (!url) return "";
            if (url.startsWith("http://") || url.startsWith("https://")) return url;
            return `${API_BASE}${url}`;
        }

        function updateImageCountdowns() {
            const imageNodes = document.querySelectorAll(".post-image[data-expires-at]");
            imageNodes.forEach((node) => {
                const expiresAt = Date.parse(node.dataset.expiresAt || "");
                if (!Number.isFinite(expiresAt)) { node.remove(); return; }
                const remaining = expiresAt - Date.now();
                if (remaining <= 0) { node.remove(); return; }
                const timer = node.querySelector(".image-timer");
                if (timer) timer.textContent = formatCountdown(remaining);
            });
        }

        function formatCountdown(ms) {
            const totalSeconds = Math.max(0, Math.floor(ms / 1000));
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            return [hours, minutes, seconds].map(v => String(v).padStart(2, "0")).join(":");
        }

        async function likePost(id, button) {
            if (button) button.disabled = true;
            const response = await api("/like", {
                method: "POST",
                body: JSON.stringify({ post_id: Number(id) })
            });
            if (response.success && button) {
                const count = button.querySelector("span");
                count.textContent = response.data.likes;
                button.classList.toggle("liked", Boolean(response.data.liked));
                button.disabled = false;
            }
        }

        function truncateText(text, maxLength) {
            if (!text) return "";
            if (text.length <= maxLength) return "\"" + text + "\"";
            return "\"" + text.substring(0, maxLength) + "...\"";
        }

        function esc(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        function fmt(dateValue) {
            return new Date(dateValue).toLocaleDateString("ru-RU", {
                day: "numeric", month: "long", hour: "2-digit", minute: "2-digit"
            });
        }

        window.postsCache = {};
        createBubbles();
        createFish();
        document.getElementById("logoLink").href = homeUrl();
        document.getElementById("backLink").href = homeUrl();
        document.getElementById("errorBackLink").href = homeUrl();
        loadUserProfile();
        setInterval(updateImageCountdowns, 1000);
    </script>
</body>
</html>
