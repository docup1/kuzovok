<!DOCTYPE html>
<html lang="ru" data-page="profile">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — Кузовок</title>
    <script>
        (function (window, document) {
            const page = document.documentElement.dataset.page;
            const path = window.location.pathname || "/";

            function trimSuffixes(suffixes) {
                for (const suffix of suffixes) {
                    if (path === suffix) {
                        return "";
                    }
                    if (path.endsWith(suffix)) {
                        return path.slice(0, -suffix.length);
                    }
                }
                if (path === "/") {
                    return "";
                }
                return path.endsWith("/") ? path.slice(0, -1) : path;
            }

            let basePath = "";
            if (page === "profile") {
                basePath = trimSuffixes(["/static/profile.html", "/profile.html", "/profile/", "/profile"]);
            } else if (page === "admin") {
                basePath = trimSuffixes(["/static/admin.html", "/admin.html", "/admin/", "/admin"]);
            } else if (page === "user") {
                const match = path.match(/\/user\/[^/]+\/?$/);
                basePath = match ? path.slice(0, -match[0].length) : trimSuffixes(["/static/user.html", "/user.html"]);
            } else {
                basePath = trimSuffixes(["/static/index.html", "/index.html", "/index.php"]);
            }

            window.__KUZOVOK_BASE_PATH__ = basePath;

            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = `${basePath}/static/app.css`;
            document.head.appendChild(link);

            window.__loadKuzovokScripts__ = function (scripts) {
                return scripts.reduce((promise, scriptName) => {
                    return promise.then(() => new Promise((resolve, reject) => {
                        const script = document.createElement("script");
                        script.src = `${basePath}/static/${scriptName}`;
                        script.async = false;
                        script.onload = resolve;
                        script.onerror = reject;
                        document.body.appendChild(script);
                    }));
                }, Promise.resolve());
            };
        })(window, document);
    </script>
</head>
<body>
    <div class="ocean-bg" id="oceanBg"></div>
    <div class="seaweed seaweed--left"></div>
    <div class="seaweed"></div>
    <div class="seaweed"></div>
    <div class="seaweed"></div>

    <main class="page-shell page-shell--narrow profile-shell">
        <div class="header">
            <a id="logoLink" class="logo-link" href="#"><img id="siteLogo" class="logo site-logo" alt="Кузовок"></a>
            <a id="backLink" class="btn btn-secondary btn-back" href="#">На главную</a>
        </div>

        <section id="authRequired" class="hidden">
            <div class="profile-card">
                <div class="center-panel">
                    <p>Для просмотра профиля необходимо <a id="authRequiredLoginLink" href="/">войти</a></p>
                </div>
            </div>
        </section>

        <section id="profileContent" class="hidden">
            <div class="profile-card">
                <div id="profileError" class="message error hidden"></div>
                <div id="profileSuccess" class="message success hidden"></div>

                <div class="profile-header">
                    <div id="profileAvatar" class="avatar">🐠</div>
                    <div class="profile-info">
                        <div id="profileName" class="profile-name">—</div>
                        <div id="profileUsername" class="profile-username">@...</div>
                        <div id="profileBio" class="profile-bio">Нет описания</div>
                        <div class="profile-stats">
                            <div class="stat">
                                <div id="postCount" class="stat-value">0</div>
                                <div class="stat-label">постов</div>
                            </div>
                            <div class="stat">
                                <div id="likeCount" class="stat-value">0</div>
                                <div class="stat-label">лайков</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="profile-actions">
                    <button id="editProfileButton" class="btn btn-primary" type="button">Редактировать</button>
                </div>
            </div>

            <div class="posts-title">Мои посты</div>
            <div id="postsContainer" class="posts-list"></div>
        </section>
    </main>

    <div id="editModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <span>Редактировать профиль</span>
                <button id="editModalCloseButton" class="modal-close" type="button">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Аватарка</label>
                    <div id="avatarPicker" class="avatar-picker"></div>
                </div>
                <div class="form-group">
                    <label for="editName">Имя</label>
                    <input type="text" id="editName" placeholder="Ваше имя">
                </div>
                <div class="form-group">
                    <label for="editBio">О себе</label>
                    <textarea id="editBio" placeholder="Расскажите о себе..."></textarea>
                </div>
            </div>
            <div class="modal-footer modal-footer--split">
                <button id="cancelEditButton" class="btn btn-secondary" type="button">Отмена</button>
                <button id="saveProfileButton" class="btn btn-primary" type="button">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        window.__loadKuzovokScripts__(["shared.js", "profile.js"]);
    </script>
</body>
</html>
